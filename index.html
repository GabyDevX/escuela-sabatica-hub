<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07080d" />
    <meta name="description" content="Recursos interactivos para Escuela Sabática" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Escuela Sabática</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;background:#07080d;color:#e8eaf6;font-family:system-ui,sans-serif}
      #root{min-height:100dvh;background:#07080d}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" style="position:fixed;inset:0;background:#07080d;display:flex;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.3s ease">
      <div style="width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;border-top-color:#5a5f80;border-right-color:#5a5f80;animation:_sp 0.7s linear infinite"></div>
      <style>@keyframes _sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
